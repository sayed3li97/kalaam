<rect x="632" y="262" width="76" height="34" rx="8" fill="#111827" stroke="#1E2A3D" stroke-width="1"/>
<text x="670" y="284" text-anchor="middle" class="arabic" font-size="13" fill="#4D6380">شَارِب</text>

<!-- Top-left node: مُشْرِب (dim) -->
<rect x="630" y="118" width="78" height="34" rx="8" fill="#111827" stroke="#1E2A3D" stroke-width="1"/>
<text x="669" y="140" text-anchor="middle" class="arabic" font-size="13" fill="#4D6380">مُشْرِب</text>

