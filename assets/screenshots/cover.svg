<svg viewBox="0 0 1000 420" width="1000" height="420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Kalaam — An Arabic tutor whose UI Gemini assembles at runtime</title>
<desc>Dark navy background. Left side: bold white Kalaam title, Arabic calligraphic subtitle in gold, tag pills for Flutter Dart GenUI Gemini, JSON code snippet. Right side: stylised Root System radial diagram with gold centre node and green satellite nodes.</desc>
<style>
  .bg { fill: #0C1120; }
  .gold { fill: #E8B430; }
  .green { fill: #58D68D; }
  .white { fill: #E6EDF3; }
  .muted { fill: #7D8590; }
  .dim { fill: #1E2A3D; }
  .dot-grid { fill: #1A2640; }
  .panel-dark { fill: #111827; }
  .sans { font-family: 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; }
  .mono { font-family: 'IBM Plex Mono', 'Fira Code', 'Courier New', monospace; }
  .arabic { font-family: 'Amiri', 'Scheherazade New', 'Traditional Arabic', serif; }
</style>

