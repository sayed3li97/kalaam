<!-- Panel divider -->
<line x1="560" y1="0" x2="560" y2="420" stroke="#1E2A3D" stroke-width="1"/>

<!-- ══ LEFT PANEL ══ -->

<!-- Gold accent bar -->
<rect x="48" y="62" width="4" height="56" fill="#E8B430" rx="2"/>

<!-- Title -->
<text x="66" y="108" class="sans" font-size="68" font-weight="700" fill="#E6EDF3">Kalaam</text>

<!-- Arabic subtitle -->
<text x="70" y="152" class="arabic" font-size="38" fill="#E8B430">كلام</text>

<!-- Tagline -->
<text x="68" y="188" class="sans" font-size="17" fill="#7D8590">An Arabic tutor whose UI</text>
<text x="68" y="212" class="sans" font-size="17" fill="#7D8590">Gemini assembles at runtime.</text>

<!-- Tag pills -->
<rect x="68" y="238" width="78" height="26" rx="5" fill="#1E2A3D" stroke="#E8B430" stroke-width="1"/>
<text x="107" y="256" text-anchor="middle" class="sans" font-size="12" font-weight="600" fill="#E8B430">Flutter</text>

<rect x="155" y="238" width="54" height="26" rx="5" fill="#1E2A3D" stroke="#7D8590" stroke-width="1"/>
<text x="182" y="256" text-anchor="middle" class="sans" font-size="12" fill="#7D8590">Dart</text>

<rect x="218" y="238" width="60" height="26" rx="5" fill="#1E2A3D" stroke="#58D68D" stroke-width="1"/>
<text x="248" y="256" text-anchor="middle" class="sans" font-size="12" fill="#58D68D">GenUI</text>

<rect x="287" y="238" width="70" height="26" rx="5" fill="#1E2A3D" stroke="#7D8590" stroke-width="1"/>
<text x="322" y="256" text-anchor="middle" class="sans" font-size="12" fill="#7D8590">Gemini</text>

<!-- JSON code block -->
<rect x="68" y="282" width="450" height="52" rx="6" fill="#111827"/>
<text x="82" y="303" class="mono" font-size="11" fill="#58D68D">createSurface</text>
<text x="186" y="303" class="mono" font-size="11" fill="#3D5A80"> → RootExplorer</text>
<text x="82" y="323" class="mono" font-size="11" fill="#7D8590">  rootWord: </text>
<text x="164" y="323" class="mono" font-size="11" fill="#E8B430">"ش-ر-ب"</text>
<text x="232" y="323" class="mono" font-size="11" fill="#7D8590">  pattern: </text>
<text x="308" y="323" class="mono" font-size="11" fill="#58D68D">"مَفْعُول"</text>

<!-- Author & repo -->
<text x="68" y="372" class="sans" font-size="13" fill="#7D8590">Sayed Ali Alkamel  ·  Google Developer Expert, Flutter</text>
<text x="68" y="396" class="mono" font-size="11" fill="#3D5A80">github.com/sayed3li97/kalaam</text>

<!-- ══ RIGHT PANEL: Root Diagram ══ -->

<!-- Outer guide ring -->
