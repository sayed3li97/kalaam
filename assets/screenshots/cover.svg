<circle cx="780" cy="210" r="48" fill="#111827" stroke="#E8B430" stroke-width="2"/>
<text x="780" y="203" text-anchor="middle" class="arabic" font-size="15" fill="#E8B430">ش - ر - ب</text>
<text x="780" y="220" text-anchor="middle" class="sans" font-size="10" fill="#7D8590">to drink</text>
<text x="780" y="234" text-anchor="middle" class="sans" font-size="8" fill="#3D5A80">root</text>

<!-- Top node: شَرِبَ (highlighted — gold, expanded) -->
<rect x="736" y="52" width="88" height="40" rx="9" fill="#1A1F00" stroke="#E8B430" stroke-width="2"/>
<text x="780" y="68" text-anchor="middle" class="arabic" font-size="16" fill="#E8B430">شَرِبَ</text>
<text x="780" y="83" text-anchor="middle" class="sans" font-size="9" fill="#C49A20">he drank · فَعَلَ</text>

<!-- Top-right node: مَشْرُوب (green, active) -->
<rect x="880" y="118" width="90" height="40" rx="9" fill="#0A1F15" stroke="#58D68D" stroke-width="1.5"/>
<text x="925" y="134" text-anchor="middle" class="arabic" font-size="14" fill="#E6EDF3">مَشْرُوب</text>
<text x="925" y="149" text-anchor="middle" class="sans" font-size="9" fill="#58D68D">a drink · مَفْعُول</text>

<!-- Bottom-right node: مَشْرَب (dim) -->
<rect x="886" y="262" width="82" height="34" rx="8" fill="#111827" stroke="#1E2A3D" stroke-width="1"/>
<text x="927" y="284" text-anchor="middle" class="arabic" font-size="13" fill="#4D6380">مَشْرَب</text>

