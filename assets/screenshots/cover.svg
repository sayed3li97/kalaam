<line x1="835" y1="248" x2="904" y2="284" stroke="#58D68D" stroke-width="1" opacity="0.55"/>
<line x1="835" y1="174" x2="900" y2="148" stroke="#58D68D" stroke-width="1" opacity="0.45"/>
<line x1="725" y1="174" x2="660" y2="148" stroke="#58D68D" stroke-width="1" opacity="0.35"/>
<line x1="725" y1="248" x2="660" y2="282" stroke="#58D68D" stroke-width="1" opacity="0.35"/>

