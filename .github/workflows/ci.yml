name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.x"

jobs:
  analyze-and-test:
    name: Format · Analyze · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      # Keyless placeholder config so the package compiles without real secrets.
      - name: Stage placeholder Firebase config
        run: cp lib/firebase_options.dart.example lib/firebase_options.dart
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Format
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze --fatal-infos
      - name: Test
        run: flutter test --coverage
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  build-android:
    name: Build Android (keyless / demo)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Stage placeholder config
        run: |
          cp lib/firebase_options.dart.example lib/firebase_options.dart
          cp android/app/google-services.json.example android/app/google-services.json
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --debug --dart-define=KALAAM_DEMO=true

  build-ios:
    name: Build iOS (keyless / demo, no codesign)
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Stage placeholder config
        run: |
          cp lib/firebase_options.dart.example lib/firebase_options.dart
          cp ios/Runner/GoogleService-Info.plist.example ios/Runner/GoogleService-Info.plist
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build ios --debug --no-codesign --dart-define=KALAAM_DEMO=true
