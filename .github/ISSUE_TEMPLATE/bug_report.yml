name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. flutter run --dart-define=KALAAM_DEMO=true
        2. Tap "Ordering Coffee"
        3. ...
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Demo Mode (--dart-define=KALAAM_DEMO=true)
        - Live (Gemini / Firebase)
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Output of `flutter doctor -v`, plus device/OS.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant console output or screenshots (redact any keys).
