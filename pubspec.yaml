name: kalaam
description: AI language learning — Flutter GenUI SDK showcase.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # GenUI — A2UI v0.9 Prompt First architecture
  genui: ^0.8.0
  json_schema_builder: ^0.1.3
  logging: ^1.2.0            # genui uses this; expose it for configureGenUiLogging

  # Firebase AI Logic — the actively-maintained successor to firebase_vertexai
  # (which is discontinued). Used via FirebaseAI.googleAI() — the Gemini
  # Developer API path, matching the genui integrate-genui-firebase skill.
  firebase_core: ^3.15.2
  firebase_ai: ^2.3.0
  # App Check protects the billable Gemini endpoint from key abuse.
  firebase_app_check: ^0.3.2

  # Navigation
  go_router: ^14.0.0

  # State
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.4.0

  # Models
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # Persistence
  shared_preferences: ^2.3.0

  # Animation — ALWAYS use this. NEVER AnimationController directly.
  flutter_animate: ^4.5.0

  # Audio (VocabCard and PhonemeCard pronunciation)
  flutter_tts: ^4.1.0

  # Spacing — ALWAYS Gap(). NEVER SizedBox for whitespace.
  gap: ^3.0.1

  # i18n
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: any
  freezed: any
  json_serializable: any
  riverpod_generator: any
  riverpod_lint: any
  custom_lint: any

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: IBMPlexSansArabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500

dependency_overrides:
  analyzer_plugin: ^0.13.0
